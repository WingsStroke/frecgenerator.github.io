<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Tablas de Frecuencia</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Generador de Tablas de Frecuencia</h1>
        
        <div class="controls">
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
            
            <div class="settings-panel">
                <h3>Configuración de Intervalos (k)</h3>
                <label>
                    <input type="radio" name="kMethod" value="sturges" checked> 
                    Automático (Regla de Sturges)
                </label>
                <label>
                    <input type="radio" name="kMethod" value="manual"> 
                    Definir Manualmente: 
                    <input type="number" id="kManualValue" min="1" step="1" placeholder="Ej: 6" disabled>
                </label>
            </div>

            <div class="btn-group">
                <button id="processBtn">1. Procesar Datos</button>
                <button id="exportBtn" class="hidden">2. Descargar Excel con Fórmulas</button>
            </div>
        </div>

        <div id="resultsArea" class="hidden">
            <h2>Tabla de Frecuencias</h2>
            <table id="freqTable">
                <thead>
                    <tr>
                        <th>Límite Inf. (Li)</th>
                        <th>Límite Sup. (Ls)</th>
                        <th>Marca de Clase (Xi)</th>
                        <th>Frec. Absoluta (fi)</th>
                        <th>Frec. Acumulada (Fi)</th>
                        <th>Frec. Relativa (hi)</th>
                        <th>Frec. Rel. Acum. (Hi)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="statsArea"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
