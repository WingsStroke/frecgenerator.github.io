<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Tablas de Frecuencia Avanzado 1.1.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <link rel="stylesheet" href="styles.css?v=1.1.0">
</head>
<body>

    <div class="container">
        <h1>Análisis Estadístico por Lotes</h1>
        
        <div class="controls">
            <div class="mode-selector">
                <h3>Modo de Importación</h3>
                <label><input type="radio" name="uploadMode" value="auto" checked> Automático (Hasta 10 archivos distintos)</label>
                <label><input type="radio" name="uploadMode" value="manual"> Selección Manual (Subir 1 archivo y seleccionar N rangos visualmente)</label>
            </div>

            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" multiple>
            
            <div class="settings-panel">
                <h3>Configuración de Intervalos (k)</h3>
                <label><input type="radio" name="kMethod" value="sturges" checked> Automático (Regla de Sturges)</label>
                <label><input type="radio" name="kMethod" value="manual"> Definir Manualmente: <input type="number" id="kManualValue" min="1" step="1" placeholder="Ej: 6" disabled></label>
            </div>

            <div class="btn-group">
                <button id="processBtn">1. Procesar Datos</button>
                <button id="exportBtn" class="hidden">2. Descargar Excel con Fórmulas</button>
            </div>
        </div>

        <div id="resultsArea" class="hidden">
            </div>
    </div>

    <div id="previewModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Previsualización de Excel</h2>
                <span class="close-btn" id="closeModalBtn">&times;</span>
            </div>
            <p>Haz clic y arrastra sobre las celdas para seleccionar un conjunto de datos (Máximo 10 rangos).</p>
            
            <div class="range-controls">
                <button id="saveRangeBtn">Guardar Rango Seleccionado</button>
                <button id="finishRangesBtn">Terminar y Procesar</button>
                <span id="rangeCount">Rangos guardados: 0/10</span>
            </div>
            
            <div id="tableContainer"></div>
        </div>
    </div>

    <script src="script.js?v=1.1.0"></script>
</body>
</html>
