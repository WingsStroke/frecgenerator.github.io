<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Frecuencias y Estadísticas</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --hover-bg: #f0f0f0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1, h2 {
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .controls {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .checkbox-group {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="file"] {
            margin-bottom: 15px;
            font-family: inherit;
        }

        button {
            background-color: var(--text-color);
            color: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: var(--text-color);
            color: var(--bg-color);
            text-transform: uppercase;
        }

        tr:nth-child(even) {
            background-color: var(--hover-bg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            border: 1px solid var(--border-color);
            padding: 15px;
        }

        .stat-card h3 {
            margin-top: 0;
            font-size: 14px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Análisis de Datos Agrupados</h1>
        
        <div class="controls">
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
            
            <div class="checkbox-group">
                <label><input type="checkbox" id="calcCentral"> Calcular Medidas de Tendencia Central (Media, Mediana, Moda)</label>
                <label><input type="checkbox" id="calcDispersion"> Calcular Medidas de Dispersión (Varianza, Desviación Estándar, Rango)</label>
                <label><input type="checkbox" id="calcPosition"> Calcular Medidas de Posición (Cuartiles Q1, Q2, Q3)</label>
            </div>

            <button id="processBtn">Procesar Datos</button>
            <button id="exportBtn" class="hidden">Exportar a Excel</button>
        </div>

        <div id="resultsArea" class="hidden">
            <h2>Tabla de Frecuencias</h2>
            <table id="freqTable">
                <thead>
                    <tr>
                        <th>Clase (Intervalo)</th>
                        <th>Marca de Clase (Xi)</th>
                        <th>Frec. Absoluta (fi)</th>
                        <th>Frec. Acumulada (Fi)</th>
                        <th>Frec. Relativa (hi)</th>
                        <th>Frec. Rel. Acum. (Hi)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div id="statsArea"></div>
        </div>
    </div>

    <script>
        let rawData = [];
        let freqDataToExport = [];

        document.getElementById('processBtn').addEventListener('click', processExcel);
        document.getElementById('exportBtn').addEventListener('click', exportToExcel);

        function processExcel() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) {
                alert("Por favor, sube un archivo Excel primero.");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                // Tomamos la primera hoja
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // Convertir a JSON
                const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                
                // Extraer solo números y ordenarlos automáticamente
                rawData = [];
                json.forEach(row => {
                    row.forEach(cell => {
                        let num = parseFloat(cell);
                        if (!isNaN(num)) rawData.push(num);
                    });
                });

                if (rawData.length === 0) {
                    alert("No se encontraron datos numéricos en el archivo.");
                    return;
                }

                // Ordenar automáticamente (regla del prompt)
                rawData.sort((a, b) => a - b);
                
                generateFrequencyTable();
                calculateStatistics();
                
                document.getElementById('resultsArea').classList.remove('hidden');
                document.getElementById('exportBtn').classList.remove('hidden');
            };

            reader.readAsArrayBuffer(file);
        }

        function generateFrequencyTable() {
            const n = rawData.length;
            const min = rawData[0];
            const max = rawData[n - 1];
            const range = max - min;
            
            // Regla de Sturges para número de clases (k)
            let k = Math.round(1 + 3.322 * Math.log10(n));
            if (k < 1) k = 1;
            
            const amplitude = range / k;
            
            const tbody = document.querySelector('#freqTable tbody');
            tbody.innerHTML = '';
            freqDataToExport = [];

            let currentMin = min;
            let cumulativeFreq = 0;

            for (let i = 0; i < k; i++) {
                let currentMax = currentMin + amplitude;
                // Ajuste para incluir el último valor en la última clase
                if (i === k - 1) currentMax = max; 

                // Frecuencia absoluta
                let count = rawData.filter(x => x >= currentMin && (i === k - 1 ? x <= currentMax : x < currentMax)).length;
                
                let xi = (currentMin + currentMax) / 2; // Marca de clase
                cumulativeFreq += count;
                let hi = count / n;
                let Hi = cumulativeFreq / n;

                let rowLabel = `[${currentMin.toFixed(2)} - ${currentMax.toFixed(2)}${i === k-1 ? ']' : ')'}`;

                // Renderizar fila
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${rowLabel}</td>
                    <td>${xi.toFixed(4)}</td>
                    <td>${count}</td>
                    <td>${cumulativeFreq}</td>
                    <td>${hi.toFixed(4)}</td>
                    <td>${Hi.toFixed(4)}</td>
                `;
                tbody.appendChild(tr);

                // Guardar para exportar
                freqDataToExport.push({
                    "Clase": rowLabel,
                    "Xi": xi,
                    "fi": count,
                    "Fi": cumulativeFreq,
                    "hi": hi,
                    "Hi": Hi
                });

                currentMin = currentMax;
            }
        }

        function calculateStatistics() {
            const statsArea = document.getElementById('statsArea');
            statsArea.innerHTML = '';
            
            const n = rawData.length;
            let html = '<div class="stats-grid">';

            // Cálculos exactos basados en los datos crudos ordenados
            if (document.getElementById('calcCentral').checked) {
                const sum = rawData.reduce((a, b) => a + b, 0);
                const mean = sum / n;
                
                const mid = Math.floor(n / 2);
                const median = n % 2 !== 0 ? rawData[mid] : (rawData[mid - 1] + rawData[mid]) / 2;

                // Moda
                let freqMap = {};
                let maxFreq = 0;
                let mode = [];
                rawData.forEach(num => {
                    freqMap[num] = (freqMap[num] || 0) + 1;
                    if (freqMap[num] > maxFreq) maxFreq = freqMap[num];
                });
                for (const key in freqMap) {
                    if (freqMap[key] === maxFreq) mode.push(Number(key));
                }

                html += `
                    <div class="stat-card">
                        <h3>Tendencia Central</h3>
                        <p><b>Media:</b> ${mean.toFixed(4)}</p>
                        <p><b>Mediana:</b> ${median.toFixed(4)}</p>
                        <p><b>Moda:</b> ${mode.join(', ')}</p>
                    </div>
                `;
            }

            if (document.getElementById('calcDispersion').checked) {
                const mean = rawData.reduce((a, b) => a + b, 0) / n;
                const variance = rawData.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / (n - 1); // Muestral
                const stdDev = Math.sqrt(variance);
                const range = rawData[n - 1] - rawData[0];

                html += `
                    <div class="stat-card">
                        <h3>Dispersión</h3>
                        <p><b>Rango:</b> ${range.toFixed(4)}</p>
                        <p><b>Varianza:</b> ${variance.toFixed(4)}</p>
                        <p><b>Desv. Estándar:</b> ${stdDev.toFixed(4)}</p>
                    </div>
                `;
            }

            if (document.getElementById('calcPosition').checked) {
                const getPercentile = (p) => {
                    const index = (p / 100) * (n - 1);
                    const lower = Math.floor(index);
                    const upper = lower + 1;
                    const weight = index % 1;
                    if (upper >= n) return rawData[lower];
                    return rawData[lower] * (1 - weight) + rawData[upper] * weight;
                };

                html += `
                    <div class="stat-card">
                        <h3>Posición (Cuartiles)</h3>
                        <p><b>Q1 (25%):</b> ${getPercentile(25).toFixed(4)}</p>
                        <p><b>Q2 (50%):</b> ${getPercentile(50).toFixed(4)}</p>
                        <p><b>Q3 (75%):</b> ${getPercentile(75).toFixed(4)}</p>
                    </div>
                `;
            }

            html += '</div>';
            statsArea.innerHTML = html;
        }

        function exportToExcel() {
            if (freqDataToExport.length === 0) return;

            // Crear un nuevo libro de trabajo
            const wb = XLSX.utils.book_new();
            
            // Convertir la matriz de datos de frecuencia a una hoja
            const ws = XLSX.utils.json_to_sheet(freqDataToExport);
            
            // Añadir la hoja al libro
            XLSX.utils.book_append_sheet(wb, ws, "Tabla_Frecuencias");
            
            // Generar y descargar el archivo
            XLSX.writeFile(wb, "Tabla_de_Frecuencias.xlsx");
        }
    </script>
</body>
</html>
